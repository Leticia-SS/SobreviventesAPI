services:
  postgres:
    image: postgres:17.8-alpine3.23
    container_name: survivor-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: survivor_db
    ports:
      - "5432:5432"
    volumes:
      - survivor_pgdata:/var/lib/postgresql/data
      - ./init/:/docker-entrypoint-initdb.d
